name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    name: Lint, test, build, and runtime checks
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository safety check
        run: npm run test:safety

      - name: Docs link check
        run: npm run test:docs

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Runtime smoke, conversation, and admin tests
        run: |
          npm run mock:ai > /tmp/evalsupport-mock-ai.log 2>&1 &
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/evalsupport-app.log 2>&1 &

          for attempt in {1..60}; do
            if curl -sf http://127.0.0.1:3000/api/runtime/status >/dev/null \
              && curl -sf -X POST http://127.0.0.1:4010/v1/chat/completions \
                -H "content-type: application/json" \
                -d '{}' >/dev/null; then
              break
            fi

            if [ "$attempt" = "60" ]; then
              echo "App or mock AI did not become ready."
              echo "--- app log ---"
              cat /tmp/evalsupport-app.log || true
              echo "--- mock ai log ---"
              cat /tmp/evalsupport-mock-ai.log || true
              exit 1
            fi

            sleep 1
          done

          npm run test:smoke
          npm run test:conversation
          npm run test:admin
